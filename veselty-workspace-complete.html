/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<!-- =========================================================
     MODULE 10: PAGE TEMPLATES
     Template function membuat halaman tambahan tetap konsisten.
     ========================================================= -->
<script>
const pageData={
 dashboard:{title:'Dashboard',sub:'Track your sales and performance of your strategy'},products:{title:'Products',sub:'Manage catalog, inventory, and product performance'},orders:{title:'Orders',sub:'Review incoming orders and fulfilment status'},customers:{title:'Customers',sub:'Understand your customers and account health'},chat:{title:'Chat',sub:'Keep conversations moving with your team'},email:{title:'Email',sub:'Plan campaigns and monitor message performance'},analytics:{title:'Analytics',sub:'Turn sales activity into decisions'},integration:{title:'Integration',sub:'Connect the tools that keep your operation moving'},performance:{title:'Performance',sub:'Track targets across teams and channels'},account:{title:'Account',sub:'Manage your profile and workspace identity'},members:{title:'Members',sub:'Invite teammates and control access'},settings:{title:'Settings',sub:'Tune preferences for the Veselty workspace'},feedback:{title:'Feedback',sub:'Help shape what gets better next'}
};
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const head=(title,sub,actions='')=>`<section class="content"><div class="page-heading"><div><div class="eyebrow">Veselty workspace</div><h1 class="page-title">${title}</h1><p class="page-sub">${sub}</p></div><div class="heading-actions">${actions||'<button class="btn"><i data-lucide="sliders-horizontal"></i>Filters</button><button class="btn dark"><i data-lucide="plus"></i>Add Widget</button>'}</div></div>`;
const end=()=>`</section>`;
const tableRows=(rows)=>rows.map(r=>`<tr>${r.map((c,i)=>`<td>${i===0?'<b>'+c+'</b>':c}</td>`).join('')}</tr>`).join('');

/* =========================================================
   MODULE 11: DASHBOARD VIEW
   ========================================================= */
function dashboard(){return head('Dashboard','Track your sales and performance of your strategy')+`<div class="dashboard-grid"><section class="panel overview"><div class="panel-head"><div class="section-title">Product overview <span class="info">i</span></div><button class="select">This month <i data-lucide="chevron-down"></i></button></div><div class="total-line"><span class="big-number">$43,630</span><span class="muted">Total sales</span></div><div class="overview-row"><span>Select by product</span><span>New sales: <b>453</b> <i data-lucide="chevron-down" width="14"></i></span></div><div class="pills"><div class="pill orange">Cosmetics ●</div><div class="pill peach">Housewest ●</div><div class="pill blank"></div></div></section><section class="panel kpis"><div class="kpi"><div class="kpi-label">Active sales <span class="info">i</span></div><div class="kpi-number">$27,064</div><div class="muted">vs last month <span class="trend up">↑12%</span></div><div class="bars"><i class="bar"></i><i class="bar"></i><i class="bar"></i></div><button class="see">See Details <i data-lucide="arrow-right"></i></button></div><div class="kpi"><div class="kpi-label">Product Revenue <span class="info">i</span></div><div class="kpi-number">$16,568</div><div class="muted">vs last month <span class="trend up">↑7%</span></div><div class="donut"></div><button class="see">See Details <i data-lucide="arrow-right"></i></button></div></section><section class="panel analytics"><div class="panel-head"><div class="section-title">Analytics <span class="info">i</span></div><div><button class="select">This year <i data-lucide="chevron-down"></i></button></div></div><div class="metric-row"><div><b class="metric-value">-$4.5430</b><span class="metric-label">Sales</span><span class="trend down">↓0.4%</span></div><div><b class="metric-value">0.73%</b><span class="metric-label">Conv. rate</span><span class="trend up">↑13%</span></div></div><div class="chart"><div class="ylabels"><span>$5K</span><span>$4K</span><span>$3K</span><span>$2K</span><span>$1K</span><span>$0K</span></div>${svgChart()}</div><div class="months"><span>JAN</span><span>FEB</span><span>MAR</span><span>APR</span><b>MAY</b><span>JUN</span><span>JUL</span><span>AUG</span></div></section><section class="panel gauge"><div class="section-title">Sales Performance <span class="info">i</span></div><div class="gauge-visual">${svgGauge()}<div class="gauge-center"><div class="gauge-number">17.9% <span class="trend up">↑</span></div><div class="gauge-caption">Since yesterday</div></div></div><div class="legend"><div class="legend-row"><i class="swatch"></i>Total Sales per day <span>For week</span></div><div class="legend-row"><i class="swatch pale"></i>Average Sales <span>For today</span></div></div><button class="see">See Details <i data-lucide="arrow-right"></i></button></section><section class="panel visits">${visitsBlock()}</section><section class="panel products">${productsBlock()}</section></div>`+end()}
function svgChart(){return `<svg viewBox="0 0 800 230" preserveAspectRatio="none"><defs><pattern id="stripe" width="15" height="15" patternUnits="userSpaceOnUse" patternTransform="rotate(25)"><rect width="7" height="15" fill="oklch(82% .1 42 / .42)"/></pattern></defs><path d="M0 164C60 130 100 150 155 132S260 130 315 103S400 138 470 91S550 84 620 75S700 102 800 86L800 160S700 178 625 163S540 150 470 164S390 205 315 180S220 198 155 180S65 189 0 215Z" fill="url(#stripe)"/><path d="M0 198C70 170 105 180 155 161S250 175 315 142S395 177 470 118S545 112 620 104S700 130 800 120" fill="none" stroke="oklch(100% .003 258)" stroke-width="18" opacity=".62"/><path d="M0 198C70 170 105 180 155 161S250 175 315 142S395 177 470 118S545 112 620 104S700 130 800 120" fill="none" stroke="oklch(72% .18 43)" stroke-width="3"/><circle cx="470" cy="118" r="4" fill="oklch(72% .18 43)"/><rect x="503" y="82" width="55" height="30" rx="8" fill="var(--ink)"/><text x="531" y="102" text-anchor="middle" fill="var(--surface)" font-size="12">+19%</text></svg>`}
function svgGauge(){return `<svg viewBox="0 0 300 220"><path d="M35 160A115 115 0 0 1 265 160" fill="none" stroke="oklch(93% .008 258)" stroke-width="12" stroke-linecap="round"/><path d="M35 160A115 115 0 0 1 265 160" fill="none" stroke="oklch(78% .1 43)" stroke-width="12" stroke-linecap="round" stroke-dasharray="360" stroke-dashoffset="176"/><path d="M58 160A92 92 0 0 1 242 160" fill="none" stroke="oklch(94% .055 42)" stroke-width="10" stroke-linecap="round"/><path d="M58 160A92 92 0 0 1 242 160" fill="none" stroke="oklch(75% .12 43)" stroke-width="10" stroke-linecap="round" stroke-dasharray="290" stroke-dashoffset="160"/></svg>`}
function visitsBlock(){return `<div class="visit-top"><div class="visit-copy"><div class="people"><i data-lucide="users-round"></i></div><div><div class="section-title">Total visits by hourly <span class="info">i</span></div><div class="visit-num">288,822 <span class="trend up">↑4%</span></div></div></div><button class="more"><i data-lucide="ellipsis"></i></button></div><div class="heatmap"><span class="day">MON</span>${'<i class="heat"></i><i class="heat mid"></i><i class="heat"></i><i class="heat"></i><i class="heat"></i><i class="heat"></i>'}<span class="day">TUE</span>${'<i class="heat"></i><i class="heat"></i><i class="heat"></i><i class="heat mid"></i><i class="heat hot"></i><i class="heat"></i>'}<span class="day">WED</span>${'<i class="heat"></i><i class="heat"></i><i class="heat mid"></i><i class="heat"></i><i class="heat hot"></i><i class="heat"></i>'}</div><div class="heat-note">♧ 3,880 (8AM)</div>`}
function productsBlock(){return `<div class="products-head"><div class="section-title">Top Products <span class="info">i</span></div><button class="link">See Details <i data-lucide="arrow-right"></i></button></div><div class="product-body"><div class="feature"><div class="feature-icon">▥</div><div class="feature-name">Blid Shorts</div><div class="feature-price">$4,730.33</div><div class="progress"><i></i></div><div class="tiny">12% targets achieved</div></div><div class="table-wrap"><table class="table"><thead><tr><th>Product</th><th>Sales</th><th>Revenue</th><th>Stock</th><th>Status</th></tr></thead><tbody>${tableRows([['Biled Shorts','127 pcs','$1,890','120','<span class="status">In Stock</span>'],['T Shirts_Mixi','540 pcs','$2,889','100','<span class="status out">Out of stock</span>']])}</tbody></table></div></div>`}

/* =========================================================
   MODULE 12: DATA PAGES
   ========================================================= */
function products(){return head('Products','Manage catalog, inventory, and product performance','<button class="btn"><i data-lucide="download"></i>Export</button><button class="btn dark"><i data-lucide="plus"></i>Add Product</button>')+`<div class="stat-strip"><div class="panel stat"><div class="stat-label">Total products</div><div class="stat-value">248</div></div><div class="panel stat"><div class="stat-label">Low stock</div><div class="stat-value">18 <span class="trend down">Needs attention</span></div></div><div class="panel stat"><div class="stat-label">Active listings</div><div class="stat-value">226 <span class="trend up">+8%</span></div></div><div class="panel stat"><div class="stat-label">Catalog value</div><div class="stat-value">$184K</div></div></div><section class="panel"><div class="toolbar"><div class="toolbar-left"><input class="filter-input" placeholder="Search products"><button class="select">All categories <i data-lucide="chevron-down"></i></button></div><div class="toolbar-right"><button class="btn"><i data-lucide="sliders-horizontal"></i>Filters</button></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Sales</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>${tableRows([['Biled Shorts','Fashion','$1,890','127 pcs','120','<span class="status">In Stock</span>','•••'],['T Shirts_Mixi','Fashion','$2,889','540 pcs','100','<span class="status out">Out of stock</span>','•••'],['Cosmetic Set','Beauty','$4,730','312 pcs','84','<span class="status">In Stock</span>','•••'],['Housewest Lamp','Home','$980','88 pcs','12','<span class="status out">Low stock</span>','•••']])}</tbody></table></div></section>`+end()}
function orders(){return head('Orders','Review incoming orders and fulfilment status','<button class="btn"><i data-lucide="download"></i>Export</button><button class="btn dark"><i data-lucide="plus"></i>Create Order</button>')+`<div class="stat-strip"><div class="panel stat"><div class="stat-label">Total orders</div><div class="stat-value">1,284</div></div><div class="panel stat"><div class="stat-label">Processing</div><div class="stat-value">86</div></div><div class="panel stat"><div class="stat-label">Completed</div><div class="stat-value">1,146 <span class="trend up">89%</span></div></div><div class="panel stat"><div class="stat-label">Returns</div><div class="stat-value">52</div></div></div><section class="panel"><div class="toolbar"><div class="toolbar-left"><input class="filter-input" placeholder="Search order ID or customer"><button class="select">This month <i data-lucide="chevron-down"></i></button></div><button class="btn"><i data-lucide="sliders-horizontal"></i>Filters</button></div><div class="table-wrap"><table class="table"><thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Amount</th><th>Payment</th><th>Status</th></tr></thead><tbody>${tableRows([['#VS-10482','Nadia Putri','Jul 14, 2026','$438.00','Paid','<span class="status">Processing</span>'],['#VS-10481','Andre M','Jul 14, 2026','$1,280.00','Paid','<span class="status">Shipped</span>'],['#VS-10480','Sari Dewi','Jul 13, 2026','$92.00','Pending','<span class="status out">Pending</span>'],['#VS-10479','Mika Tan','Jul 13, 2026','$754.00','Paid','<span class="status">Delivered</span>']])}</tbody></table></div></section>`+end()}
function customers(){return head('Customers','Understand your customers and account health','<button class="btn"><i data-lucide="download"></i>Export</button><button class="btn dark"><i data-lucide="user-plus"></i>Add Customer</button>')+`<div class="stat-strip"><div class="panel stat"><div class="stat-label">Total customers</div><div class="stat-value">18,492</div></div><div class="panel stat"><div class="stat-label">New this month</div><div class="stat-value">1,284 <span class="trend up">+14%</span></div></div><div class="panel stat"><div class="stat-label">Repeat rate</div><div class="stat-value">68.4%</div></div><div class="panel stat"><div class="stat-label">Avg. order value</div><div class="stat-value">$182</div></div></div><section class="panel"><div class="toolbar"><input class="filter-input" placeholder="Search customers"><button class="btn"><i data-lucide="sliders-horizontal"></i>Filters</button></div><div class="table-wrap"><table class="table"><thead><tr><th>Customer</th><th>Location</th><th>Orders</th><th>Spent</th><th>Last active</th><th>Segment</th></tr></thead><tbody>${tableRows([['Nadia Putri','Jakarta, ID','24','$4,820','2 hours ago','VIP'],['Andre M','Bandung, ID','12','$2,180','Yesterday','Returning'],['Sari Dewi','Surabaya, ID','8','$1,420','3 days ago','New'],['Mika Tan','Singapore, SG','31','$8,941','Today','VIP']])}</tbody></table></div></section>`+end()}
function chat(){return head('Chat','Keep conversations moving with your team','<button class="btn dark"><i data-lucide="plus"></i>New conversation</button>')+`<section class="panel chat-layout"><div class="chat-list"><div class="chat-search"><input placeholder="Search conversations"></div>${[['AP','Ari Pratama','Can you check the new campaign?','2m'],['MN','Mina Noor','The order report is ready.','18m'],['RK','Raka K','Nice, shipping is moving.','1h'],['DS','Dina S','Please review the mockups.','3h']].map((x,i)=>`<div class="chat-person ${i===0?'selected':''}"><div class="avatar">${x[0]}</div><div class="list-main"><div class="list-title">${x[1]}</div><div class="list-meta">${x[2]}</div></div><small class="muted">${x[3]}</small></div>`).join('')}</div><div class="chat-window"><div class="chat-header"><div class="avatar">AP</div><div><div class="list-title">Ari Pratama</div><div class="list-meta">Online now</div></div></div><div class="chat-messages"><div class="bubble">Can you check the new campaign numbers?</div><div class="bubble me">Yep, active sales are up 12% this month. I added the detail to the dashboard.</div><div class="bubble">Perfect, thanks. Let’s use that in the weekly update.</div></div><form class="chat-compose"><input placeholder="Write a message"><button class="btn accent"><i data-lucide="send"></i></button></form></div></section>`+end()}
function email(){return head('Email','Plan campaigns and monitor message performance','<button class="btn dark"><i data-lucide="plus"></i>New campaign</button>')+`<div class="stat-strip"><div class="panel stat"><div class="stat-label">Open rate</div><div class="stat-value">42.8% <span class="trend up">+6%</span></div></div><div class="panel stat"><div class="stat-label">Click rate</div><div class="stat-value">8.4%</div></div><div class="panel stat"><div class="stat-label">Subscribers</div><div class="stat-value">24,830</div></div><div class="panel stat"><div class="stat-label">Unsubscribed</div><div class="stat-value">0.7%</div></div></div><section class="panel"><div class="toolbar"><div class="toolbar-left"><input class="filter-input" placeholder="Search campaigns"><button class="select">All status <i data-lucide="chevron-down"></i></button></div><button class="btn"><i data-lucide="sliders-horizontal"></i>Filters</button></div><div class="list">${[['July product launch','Sent Jul 12, 2026','42.8% open rate','Sent'],['VIP early access','Sent Jul 09, 2026','56.1% open rate','Sent'],['Cart recovery sequence','Updated Jul 08, 2026','Draft campaign','Draft']].map(x=>`<div class="list-row"><div class="product-thumb"><i data-lucide="mail"></i></div><div class="list-main"><div class="list-title">${x[0]}</div><div class="list-meta">${x[1]} · ${x[2]}</div></div><span class="status ${x[3]==='Draft'?'out':''}">${x[3]}</span><i data-lucide="chevron-right"></i></div>`).join('')}</div></section>`+end()}

/* =========================================================
   MODULE 13: BUSINESS INSIGHT PAGES
   ========================================================= */
function analytics(){return head('Analytics','Turn sales activity into decisions','<button class="select">This year <i data-lucide="chevron-down"></i></button><button class="btn"><i data-lucide="download"></i>Export</button>')+`<div class="analytics-grid"><section class="panel chart-card"><div class="panel-head"><div><div class="section-title">Revenue trend</div><div class="muted">Monthly performance across all products</div></div><span class="trend up">↑18.4%</span></div><div class="line-chart">${svgChart()}</div></section><section class="panel chart-card"><div class="section-title">Revenue by category</div><div class="donut-big"></div><div class="legend-large"><div><i class="swatch"></i>Cosmetics <span>48%</span></div><div><i class="swatch pale"></i>Housewest <span>32%</span></div><div><i class="swatch" style="background:oklch(85% .04 258)"></i>Other <span>20%</span></div></div></section></div><div class="stat-strip" style="margin-top:16px"><div class="panel stat"><div class="stat-label">Conversion rate</div><div class="stat-value">0.73%</div></div><div class="panel stat"><div class="stat-label">Customer acquisition cost</div><div class="stat-value">$24.80</div></div><div class="panel stat"><div class="stat-label">Lifetime value</div><div class="stat-value">$438</div></div><div class="panel stat"><div class="stat-label">Gross margin</div><div class="stat-value">62.4%</div></div></div>`+end()}
function integration(){return head('Integration','Connect the tools that keep your operation moving','<button class="btn dark"><i data-lucide="plus"></i>Browse integrations</button>')+`<div class="integration-grid">${[['Google Calendar','Sync important events and deadlines.','Connected','calendar-days'],['Stripe','Track payments, refunds, and revenue.','Connected','credit-card'],['Mailchimp','Keep campaign audiences in sync.','Connected','mail'],['Shopify','Import orders and product inventory.','Connect','shopping-bag'],['Zapier','Trigger workflows across 5,000+ apps.','Connect','workflow'],['Google Sheets','Push reports to shared spreadsheets.','Connect','table-2']].map(x=>`<article class="panel integration-item"><div class="integration-icon"><i data-lucide="${x[3]}"></i></div><div class="integration-copy"><h3>${x[0]}</h3><p>${x[1]}</p><div class="connected" style="color:${x[2]==='Connect'?'var(--muted)':'oklch(43% .12 157)'}">${x[2]} ${x[2]==='Connected'?'✓':'→'}</div></div></article>`).join('')}</div>`+end()}
function performance(){return head('Performance','Track targets across teams and channels','<button class="select">Q3 2026 <i data-lucide="chevron-down"></i></button><button class="btn dark"><i data-lucide="plus"></i>Add goal</button>')+`<div class="performance-grid"><section class="panel panel-pad"><div class="panel-head"><div><div class="section-title">Team goals</div><div class="muted">Progress through July 14, 2026</div></div><span class="trend up">On track</span></div><div class="goal"><div class="goal-top"><span class="goal-name">Monthly revenue</span><span class="goal-value">82%</span></div><div class="muted">$43,630 of $53,000</div><div class="goal-track"><i style="width:82%"></i></div></div><div class="goal"><div class="goal-top"><span class="goal-name">New customers</span><span class="goal-value">68%</span></div><div class="muted">1,284 of 1,900</div><div class="goal-track"><i style="width:68%"></i></div></div><div class="goal"><div class="goal-top"><span class="goal-name">Repeat orders</span><span class="goal-value">91%</span></div><div class="muted">1,146 of 1,260</div><div class="goal-track"><i style="width:91%"></i></div></div></section><section class="panel panel-pad"><div class="section-title">Latest highlights</div><div class="list" style="margin-top:10px"><div class="list-row"><div class="people"><i data-lucide="trending-up"></i></div><div class="list-main"><div class="list-title">Active sales grew 12%</div><div class="list-meta">Best week since April</div></div></div><div class="list-row"><div class="people"><i data-lucide="package-check"></i></div><div class="list-main"><div class="list-title">Inventory accuracy improved</div><div class="list-meta">Up to 96.2% this month</div></div></div><div class="list-row"><div class="people"><i data-lucide="user-plus"></i></div><div class="list-main"><div class="list-title">1,284 new customers</div><div class="list-meta">14% above target</div></div></div></div></section></div>`+end()}

/* =========================================================
   MODULE 14: ACCOUNT + WORKSPACE PAGES
   ========================================================= */
function account(){return head('Account','Manage your profile and workspace identity','<button class="btn accent" data-save>Save changes</button>')+`<div class="settings-layout"><nav class="panel settings-nav"><button class="settings-tab active">Profile</button><button class="settings-tab">Security</button><button class="settings-tab">Notifications</button></nav><section class="panel form-panel"><div class="panel-head"><div><div class="section-title">Profile details</div><div class="muted">This information is visible to your workspace members.</div></div></div><div class="form-grid"><div class="field"><label>First name</label><input value="Jevline"></div><div class="field"><label>Last name</label><input value="Kief"></div><div class="field"><label>Email address</label><input value="jevline@veselty.co"></div><div class="field"><label>Role</label><select><option>Admin</option><option>Member</option></select></div><div class="field full"><label>Bio</label><textarea>Leading growth and operations at Veselty Inc.</textarea></div></div><div class="form-footer"><button class="btn" data-toast="Perubahan dibatalkan">Cancel</button><button class="btn accent" data-save>Save changes</button></div></section></div>`+end()}
function members(){return head('Members','Invite teammates and control access','<button class="btn dark"><i data-lucide="user-plus"></i>Invite member</button>')+`<section class="panel"><div class="toolbar"><div><b>Workspace members</b><span class="muted"> · 8 people</span></div><input class="filter-input" placeholder="Search members"></div><div class="list">${[['JK','Jevline kief','jevline@veselty.co','Admin'],['AP','Ari Pratama','ari@veselty.co','Editor'],['MN','Mina Noor','mina@veselty.co','Editor'],['RK','Raka K','raka@veselty.co','Viewer'],['DS','Dina S','dina@veselty.co','Viewer']].map(x=>`<div class="member-card"><div class="avatar">${x[0]}</div><div class="member-info"><div class="member-name">${x[1]}</div><div class="member-email">${x[2]}</div></div><span class="role">${x[3]}</span><button class="more"><i data-lucide="ellipsis"></i></button></div>`).join('')}</div></section>`+end()}
function settings(){return head('Settings','Tune preferences for the Veselty workspace','<button class="btn accent" data-save>Save changes</button>')+`<div class="settings-layout"><nav class="panel settings-nav"><button class="settings-tab active">Workspace</button><button class="settings-tab">Billing</button><button class="settings-tab">Data</button><button class="settings-tab">Automations</button></nav><section class="panel form-panel"><div class="panel-head"><div><div class="section-title">Workspace settings</div><div class="muted">Basic details used across reports and notifications.</div></div></div><div class="form-grid"><div class="field"><label>Workspace name</label><input value="Veselty Inc."></div><div class="field"><label>Workspace URL</label><input value="veselty.clickup.com"></div><div class="field"><label>Default currency</label><select><option>USD - US Dollar</option><option>IDR - Indonesian Rupiah</option></select></div><div class="field"><label>Timezone</label><select><option>Asia/Jakarta</option><option>Asia/Singapore</option></select></div><div class="field full"><label>Workspace description</label><textarea>Sales and performance workspace for Veselty Inc.</textarea></div></div><div class="form-footer"><button class="btn" data-toast="Perubahan dibatalkan">Cancel</button><button class="btn accent" data-save>Save changes</button></div></section></div>`+end()}
function feedback(){return head('Feedback','Help shape what gets better next')+`<section class="panel panel-pad feedback-box"><div class="section-title">How is Veselty working for you?</div><p class="muted" style="margin-top:5px">Your feedback helps us prioritize the details that make daily work easier.</p><div class="rating"><button>1</button><button>2</button><button>3</button><button>4</button><button>5</button></div><div class="field" style="margin-top:20px"><label>Tell us more</label><textarea placeholder="What should we improve?"></textarea></div><div class="form-footer"><button class="btn accent" data-toast="Feedback terkirim. Terima kasih!">Send feedback</button></div></section>`+end()}
const views={dashboard,products,orders,customers,chat,email,analytics,integration,performance,account,members,settings,feedback};

/* =========================================================
   MODULE 15: ROUTER + INTERACTIONS
   ========================================================= */
function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}
function render(page=location.hash.slice(1)||'dashboard'){if(!views[page])page='dashboard';document.getElementById('page-root').innerHTML=views[page]();document.querySelectorAll('.nav-item').forEach(item=>item.classList.toggle('active',item.dataset.page===page));if(window.lucide)lucide.createIcons();bindPageEvents();window.scrollTo({top:0,behavior:'smooth'})}
function bindPageEvents(){document.querySelectorAll('[data-toast]').forEach(el=>el.addEventListener('click',()=>showToast(el.dataset.toast)));document.querySelectorAll('[data-save]').forEach(el=>el.addEventListener('click',()=>showToast('Perubahan berhasil disimpan')));document.querySelectorAll('.rating button').forEach(el=>el.addEventListener('click',()=>{document.querySelectorAll('.rating button').forEach(x=>x.classList.remove('selected'));el.classList.add('selected')}));document.querySelectorAll('.settings-tab').forEach(el=>el.addEventListener('click',()=>{document.querySelectorAll('.settings-tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');showToast(el.textContent+' dibuka')}));}
document.querySelectorAll('.nav-item').forEach(item=>item.addEventListener('click',()=>{location.hash=item.dataset.page}));window.addEventListener('hashchange',()=>render());document.querySelectorAll('[data-toast]').forEach(el=>el.addEventListener('click',()=>showToast(el.dataset.toast)));document.getElementById('global-search').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.value.trim())showToast('Mencari: '+e.target.value.trim())});render();
</script>
</body>
</html>
